# arkiv — Docker Compose
version: "3.8"

services:
  arkiv:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./media.db:/app/media.db
      - ./chroma_db:/app/chroma_db
      - ./thumbnails:/app/thumbnails
    environment:
      - ARKIV_DB_PATH=/app/media.db
      - ARKIV_CHROMA_PATH=/app/chroma_db
      - ARKIV_THUMBNAILS_DIR=/app/thumbnails
      - ARKIV_OLLAMA_URL=http://ollama:11434
      - ARKIV_EMBED_MODEL=nomic-embed-text
      - ARKIV_VISION_MODEL=llava:7b
      - ARKIV_WHISPER_MODEL=large-v3-turbo
      - ARKIV_HOST=0.0.0.0
      - ARKIV_PORT=8501
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # NVIDIA GPU passthrough (uncomment for CUDA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # macOS: GPU passthrough not needed (Ollama uses Metal natively on host)
    restart: unless-stopped

volumes:
  ollama_data:
