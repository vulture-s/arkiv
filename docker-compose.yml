# arkiv — Docker Compose
version: "3.8"

services:
  arkiv:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./media.db:/app/media.db
      - ./chroma_db:/app/chroma_db
      - ./thumbnails:/app/thumbnails
    environment:
      - ARKIV_OLLAMA_URL=http://host.docker.internal:11434
    restart: unless-stopped

