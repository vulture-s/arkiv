<script>
// Early error handler — catches any JS error and reports to server + screen
window.onerror = function(msg, src, line, col, err) {
  var payload = msg + ' at ' + (src||'?') + ':' + line + ':' + col;
  try { fetch('/api/client-log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({level:'error', msg:payload}) }); } catch(e){}
  var box = document.getElementById('_errBox');
  if (!box) { box = document.createElement('div'); box.id='_errBox'; box.style.cssText='position:fixed;top:8px;left:8px;z-index:99999;background:#1a0000;border:2px solid #ef4444;border-radius:8px;padding:12px;font:12px/1.4 monospace;color:#f87171;max-width:500px;max-height:300px;overflow-y:auto'; document.body.appendChild(box); }
  box.innerHTML += '<div>' + payload + '</div>';
  return false;
};
window.onunhandledrejection = function(e) {
  var msg = 'Unhandled rejection: ' + (e.reason ? (e.reason.message || e.reason) : 'unknown');
  try { fetch('/api/client-log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({level:'error', msg:msg}) }); } catch(ex){}
  window.onerror(msg, '', 0, 0, null);
};
</script>

<script>
function toggleTheme() {
  const h = document.documentElement;
  const nowDark = !h.classList.contains('dark');
  h.classList.toggle('dark', nowDark);
  h.classList.toggle('light', !nowDark);
  document.querySelectorAll('.dark-icon').forEach(el => el.style.display = nowDark ? 'block' : 'none');
  document.querySelectorAll('.light-icon').forEach(el => el.style.display = nowDark ? 'none' : 'block');
}
</script>

<script>
var API = '';
var PAGE_SIZE = 50;

// ── Tauri Detection + Dialog Helpers ──────────────────────────────────
var isTauri = !!(window.__TAURI__);

async function tauriMessage(msg) {
  if (isTauri) {
    try { await window.__TAURI__.dialog.message(msg, { title: 'arkiv' }); return; }
    catch(e) {}
  }
  alert(msg);
}
async function tauriAsk(msg) {
  if (isTauri) {
    try { return await window.__TAURI__.dialog.ask(msg, { title: 'arkiv' }); }
    catch(e) {}
  }
  return confirm(msg);
}
async function nativeOpenPath(filePath) {
  if (isTauri) {
    const { openPath } = window.__TAURI__.opener;
    await openPath(filePath);
  } else {
    // Browser fallback: copy path to clipboard
    await navigator.clipboard.writeText(filePath);
    alert('路徑已複製到剪貼簿：\n' + filePath);
  }
}
async function nativePickFolder() {
  if (isTauri) {
    try {
      if (window.__TAURI__.dialog && window.__TAURI__.dialog.open)
        return await window.__TAURI__.dialog.open({ directory: true, title: 'Select folder' });
    } catch(e) {}
    try {
      if (window.__TAURI__.core)
        return await window.__TAURI__.core.invoke('plugin:dialog|open', { options: { directory: true, title: 'Select folder' } });
    } catch(e) {}
  }
  return prompt('Enter media folder path:');
}
function showLimitModal(total, newCount) {
  return new Promise((resolve) => {
    const m = document.createElement('div');
    m.style.cssText = 'position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6)';
    m.innerHTML = `<div class="modal-panel" style="min-width:360px">
      <div class="text-txt-primary" style="font-size:16px;font-weight:600;margin-bottom:8px">找到 ${total} 個媒體檔案（${newCount} 個新的）</div>
      <div class="text-txt-secondary" style="font-size:12px;margin-bottom:16px">要處理幾個？（0 = 全部，建議先試 3）</div>
      <input id="limitInput" type="number" value="${newCount > 3 ? 3 : 0}" min="0"

      <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
        <button id="limitCancel" style="padding:6px 16px;font-size:12px;border:1px solid #555;border-radius:6px;cursor:pointer" class="text-txt-secondary">取消</button>
        <button id="limitOk" style="padding:6px 16px;font-size:12px;border-radius:6px;cursor:pointer;background:#3b82f6;color:#fff;border:none">確認</button>
      </div>
    </div>`;
    document.body.appendChild(m);
    document.getElementById('limitInput').focus();
    document.getElementById('limitOk').onclick = () => { const v = parseInt(document.getElementById('limitInput').value) || 0; m.remove(); resolve(v); };
    document.getElementById('limitCancel').onclick = () => { m.remove(); resolve(null); };
    document.getElementById('limitInput').onkeydown = (e) => { if(e.key==='Enter') document.getElementById('limitOk').click(); };
  });
}
var VIDEO_EXT = ['.mp4','.mov','.m4v','.mts'];
var AUDIO_EXT = ['.wav','.mp3','.m4a','.aac'];

var gridCols = 4;

  filters: { type: 'all', rating: null, lang: null }, sort: 'date', query: '', view: 'grid' };

// ── Utils ───────────────────────────────────────────────────────────────────

function fmtDur(s) {
  if (!s || s <= 0) return '0s'; s = Math.round(s);
  if (s < 60) return s+'s';
  const m = Math.floor(s/60), sec = s%60;
  if (m < 60) return sec ? `${m}m ${sec}s` : `${m}m`;
  const h = Math.floor(m/60), mn = m%60;
  return mn ? `${h}h ${mn}m` : `${h}h`;
}
function fmtHMS(s) {
  if (!s) return '00:00:00'; s=Math.round(s);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function fmtSize(mb) { if (!mb||mb<=0) return '0 MB'; return mb>=1024 ? `${(mb/1024).toFixed(1)} GB` : `${Math.round(mb)} MB`; }
function mediaType(ext) { if(VIDEO_EXT.includes(ext)) return 'video'; if(AUDIO_EXT.includes(ext)) return 'audio'; return 'other'; }

function rBadge(r) {
  if(r==='good') return '<span class="badge-good">GOOD</span>';
  if(r==='ng') return '<span class="badge-ng">NG</span>';
  if(r==='review') return '<span class="badge-review">REV</span>';
  return '';
}
function tagHtml(tags) { return (tags||[]).map(t=>`<span class="tag tag-${t.source==='auto'?'auto':'manual'}">${t.name}</span>`).join(' '); }
function thumbUrl(rec) { if(rec.thumbnail_path){ return `/thumbnails/${rec.thumbnail_path.split('/').pop()}`; } return null; }

function waveformBars() {
  const heights = [30,45,60,40,75,55,80,90,70,85,65,50,75,95,80,60,45,70,55,85,90,75,60,40,55,70,80,65,50,35,45,60,75,55,40,30];

}
function filmstripFrames() {
  const frames = [];
  for(let i=0;i<10;i++) { const bg = i%3===1 ? ' style="background:linear-gradient(135deg,#2e3035,#383840)"' : i%3===2 ? ' style="background:linear-gradient(135deg,#30333a,#3a3a42)"' : '';
    frames.push(`<div class="filmstrip-frame"${bg}></div>`); }
  return frames.join('');

// ── API ─────────────────────────────────────────────────────────────────────

async function fetchMedia() {
  const p = new URLSearchParams({ offset: state.page*PAGE_SIZE, limit: PAGE_SIZE, sort: state.sort });
  if(state.query) p.set('q', state.query);
  if(state.filters.lang) p.set('lang', state.filters.lang);
  if(state.filters.rating) p.set('rating', state.filters.rating);
  if(state.filters.type && state.filters.type!=='all') p.set('media_type', state.filters.type);
  const r = await fetch(`${API}/api/media?${p}`); const d = await r.json();
  state.items = d.items; state.total = d.total;
}
async function fetchDetail(id) {
  var r = await fetch(API + '/api/media/' + id);
  if (!r.ok) throw new Error('fetchDetail HTTP ' + r.status);
  state.selectedRec = await r.json();
  state.selectedId = id;
}
async function setRating(id, rating, note) { await fetch(`${API}/api/media/${id}/rating`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rating,note}) }); }
async function addTagApi(id, name) { await fetch(`${API}/api/media/${id}/tags`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,source:'manual'}) }); }
async function removeTagApi(id, name) { await fetch(`${API}/api/media/${id}/tags/${encodeURIComponent(name)}`, {method:'DELETE'}); }
async function fetchStats() { return (await fetch(`${API}/api/stats`)).json(); }
async function fetchAllTags() { state.allTags = await (await fetch(`${API}/api/tags`)).json(); }

function renderPool(items) {

    h += `<div class="collapse-toggle flex items-center gap-1.5 px-3 py-1 text-2xs text-txt-tertiary uppercase tracking-wider">

    videos.forEach(v => {
      var active = v.id===state.selectedId;
      var icon = active ? videoSmallActive : videoSmall;
      var badge = rBadge(v.rating);
      var t = thumbUrl(v);
      var thumbEl = t
        ? '<div style="position:relative;width:24px;height:16px;flex-shrink:0;border-radius:2px;overflow:hidden;background:#222">' + icon + '<img src="' + t + '" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'"/></div>'

        ${thumbEl}<span class="truncate">${v.filename}</span>

      <svg fill="currentColor" viewBox="0 0 10 10" style="width:10px;height:10px"><path d="M3 2l5 3-5 3z"/></svg>Audio <span class="ml-auto text-txt-tertiary">(${audios.length})</span></div>`;

async function renderAnalytics() {
  try {
    const stats = await fetchStats();
    const r = stats.rating||{}, total = stats.total||1;
    const goodPct = Math.round((r.good||0)/total*100), ngPct = Math.round((r.ng||0)/total*100), unrPct = Math.round((r.unrated||0)/total*100);
    const topTags = (stats.top_tags||[]).map(t=>`<span class="tag tag-auto">${t.name} <sup>${t.count}</sup></span>`).join(' ');

    // Fetch duration-by-lang and size-by-ext
    let langBars = '', sizeBars = '';
    try {
      const langs = await (await fetch('/api/duration-by-lang')).json();
      const totalDur = langs.reduce((s,l) => s+l.total_s, 0) || 1;
      langBars = langs.map(l => {
        const pct = Math.round(l.total_s/totalDur*100);
        return `<div class="flex items-center gap-1 text-2xs"><span class="w-6 text-txt-tertiary">${l.lang||'?'}</span><div class="w-16 h-1.5 bg-surface-200 rounded-full overflow-hidden"><div class="h-full bg-accent rounded-full" style="width:${pct}%"></div></div><span class="text-txt-tertiary">${fmtDur(l.total_s)}</span></div>`;
      }).join('');
    } catch(e) {}
    try {
      const exts = await (await fetch('/api/size-by-ext')).json();
      const totalMb = exts.reduce((s,e) => s+e.total_mb, 0) || 1;
      sizeBars = exts.map(e => {
        const pct = Math.round(e.total_mb/totalMb*100);
        return `<div class="flex items-center gap-1 text-2xs"><span class="w-8 text-txt-tertiary">${e.ext}</span><div class="w-16 h-1.5 bg-surface-200 rounded-full overflow-hidden"><div class="h-full bg-warning rounded-full" style="width:${pct}%"></div></div><span class="text-txt-tertiary">${(e.total_mb/1024).toFixed(1)}GB</span></div>`;
      }).join('');
    } catch(e) {}

    document.getElementById('analyticsContent').innerHTML = `
      <div class="flex items-center gap-2"><div><div class="text-2xs text-txt-tertiary">Total</div><div class="text-sm font-semibold">${stats.total}</div></div><div class="sparkline w-16"></div></div>
      <div class="flex items-center gap-2"><div><div class="text-2xs text-txt-tertiary">GOOD</div><div class="text-sm font-semibold text-success">${r.good||0}</div></div>
        <div class="w-16 h-1.5 bg-surface-200 rounded-full overflow-hidden"><div class="h-full bg-success rounded-full" style="width:${goodPct}%"></div></div></div>
      <div class="flex items-center gap-2"><div><div class="text-2xs text-txt-tertiary">NG</div><div class="text-sm font-semibold text-danger">${r.ng||0}</div></div>
        <div class="w-16 h-1.5 bg-surface-200 rounded-full overflow-hidden"><div class="h-full bg-danger rounded-full" style="width:${ngPct}%"></div></div></div>
      <div class="flex items-center gap-2"><div><div class="text-2xs text-txt-tertiary">Unrated</div><div class="text-sm font-semibold text-txt-tertiary">${r.unrated||0}</div></div>
        <div class="w-16 h-1.5 bg-surface-200 rounded-full overflow-hidden"><div class="h-full bg-txt-tertiary rounded-full" style="width:${unrPct}%"></div></div></div>
      <div class="flex items-center gap-2"><div><div class="text-2xs text-txt-tertiary">Duration</div><div class="text-sm font-semibold">${fmtDur(stats.total_duration_s)}</div></div><div class="sparkline w-16"></div></div>
      ${langBars ? `<div class="flex flex-col gap-0.5"><div class="text-2xs text-txt-tertiary font-semibold">Duration by Lang</div>${langBars}</div>` : ''}
      ${sizeBars ? `<div class="flex flex-col gap-0.5"><div class="text-2xs text-txt-tertiary font-semibold">Size by Type</div>${sizeBars}</div>` : ''}
      <div class="flex items-center gap-3 ml-auto text-2xs text-txt-tertiary"><span>Top tags:</span>${topTags}</div>`;

    document.getElementById('headerStats').innerHTML = `<span>${stats.total} files</span><span>·</span><span class="text-success">${r.good||0} GOOD</span><span>·</span><span class="text-danger">${r.ng||0} NG</span>`;

    document.getElementById('poolStats').innerHTML = `
      <div class="flex justify-between" style="margin-bottom:2px"><span>Total</span><span>${stats.total} files</span></div>
      <div class="flex justify-between" style="margin-bottom:2px"><span>GOOD</span><span class="text-success">${r.good||0} (${goodPct}%)</span></div>
      <div class="flex justify-between" style="margin-bottom:2px"><span>NG</span><span class="text-danger">${r.ng||0} (${ngPct}%)</span></div>
      <div class="flex justify-between"><span>Unrated</span><span>${r.unrated||0}</span></div>`;
  } catch(e) { console.error(e); }
}

async function doExport(id, fmt) {
  try {
    var rec = state.selectedRec || state.items.find(r => r.id === id);
    var basename = rec ? rec.filename.replace(/\.[^.]+$/, '') : 'media_' + id;
    var filename = basename + '.' + fmt;

    if (isTauri && window.__TAURI__ && window.__TAURI__.dialog) {
      // Tauri: pick save path, then server writes file directly
      try {
        var savePath = await window.__TAURI__.dialog.save({ defaultPath: filename, title: 'Export ' + fmt.toUpperCase() });
        if (!savePath) return;
        var resp = await fetch('/api/media/' + id + '/export-to', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({fmt: fmt, dest: savePath})
        });
        if (resp.ok) { await tauriMessage('已匯出：' + savePath); }
        else { await tauriMessage('Export 失敗：HTTP ' + resp.status); }
        return;
      } catch(te) { console.log('Tauri export fallback:', te); }
    }
    // Browser fallback: blob download
    var resp = await fetch('/api/media/' + id + '/export/' + fmt);
    if (!resp.ok) { await tauriMessage('Export 失敗：HTTP ' + resp.status); return; }
    var blob = new Blob([await resp.text()], {type:'text/plain;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { await tauriMessage('Export 錯誤：' + e.message); }
}

  // Keep container's aspect-ratio + max-height, just swap content

  var vid = document.createElement('video');

  vid.src = '/api/stream/' + id;
  vid.autoplay = true;

  container.appendChild(vid);

  // Integrate controls into waveform area
  var waveform = document.getElementById('inspectorWaveform');
  var waveformParent = waveform ? waveform.parentElement : null;
  if (waveformParent) {
    // Replace waveform area with integrated transport bar
    waveformParent.innerHTML = ''
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      +   '<button id="ppBtn" style="background:none;border:none;cursor:pointer;padding:0;flex-shrink:0"><svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20" style="width:16px;height:16px;color:#e4e4e7"><rect x="5" y="3" width="3" height="14"/><rect x="12" y="3" width="3" height="14"/></svg></button>'
      +   '<span id="playerTime" style="color:#a1a1aa;font-size:10px;font-family:monospace;min-width:32px">0:00</span>'
      +   '<div id="inspectorWaveform" class="waveform" style="flex:1;cursor:pointer" title="Click to seek"><div class="waveform-bars">' + waveformBars() + '</div><div class="waveform-playhead" id="wavePlayhead"></div></div>'
      +   '<svg width="14" height="14" fill="none" stroke="#71717a" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;flex-shrink:0"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>'
      +   '<input type="range" id="playerVol" min="0" max="100" value="80" style="width:44px;height:3px;accent-color:#3b82f6;cursor:pointer;flex-shrink:0"/>'
      + '</div>'
      + '<div class="flex justify-between text-2xs font-mono"><span class="text-success" id="inTimeDisplay">IN ' + fmtHMS(0) + '</span><span class="text-txt-tertiary" id="currentTimeDisplay">' + fmtDur(rec.duration_s) + '</span><span class="text-danger" id="outTimeDisplay">OUT ' + fmtHMS(rec.duration_s) + '</span></div>';
  }

  // Play/pause toggle
  document.getElementById('ppBtn').onclick = function(){ vid.paused ? vid.play() : vid.pause(); };
  document.getElementById('playerVol').oninput = function(){ vid.volume = this.value / 100; };

  // Waveform seek
  var playhead = document.getElementById('wavePlayhead');
  var seekBar = document.getElementById('inspectorWaveform');
  if (seekBar) {
    seekBar.onclick = function(e) {
      if (!vid.duration) return;
      var rect = this.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      vid.currentTime = vid.duration * pct;
    };
  }

  // Sync timeupdate
  vid.ontimeupdate = function() {
    var pct = vid.duration ? (vid.currentTime / vid.duration * 100) : 0;
    if (playhead) playhead.style.left = pct + '%';
    var el = document.getElementById('currentTimeDisplay');
    if (el) el.textContent = fmtHMS(vid.currentTime);
    var pt = document.getElementById('playerTime');
    if (pt) { var s = Math.floor(vid.currentTime), m = Math.floor(s/60); s = s%60; pt.textContent = m + ':' + (s<10?'0':'') + s; }
  };
  vid.onplay = function() {
    var svg = document.querySelector('#ppBtn svg');
    if (svg) svg.innerHTML = '<rect x="5" y="3" width="3" height="14"/><rect x="12" y="3" width="3" height="14"/>';
  };

    var svg = document.querySelector('#ppBtn svg');
    if (svg) svg.innerHTML = '<path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>';

    errDiv.innerHTML = '<div style="text-align:center;color:#f87171;font-size:12px"><div style="font-size:20px;margin-bottom:4px">&#9888;</div>串流失敗 — 檔案可能不存在</div>';
    container.appendChild(errDiv);
    setTimeout(function(){ errDiv.remove(); }, 3000);
  };
}

async function doAddMediaFolder() {
  let path;
  try {
    path = await nativePickFolder();
  } catch(e) {
    await tauriMessage('無法開啟資料夾選擇器：' + e.message);
    return;
  }
  if (!path) return;

  // Step 1: Scan (fast)
  showIngestModal('掃描中...', '正在讀取資料夾');
  let scan;
  try {
    const r = await fetch('/api/ingest/scan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path})
    });
    if (!r.ok) { hideIngestModal(); await tauriMessage('路徑不存在：' + path); return; }
    scan = await r.json();
  } catch(e) { hideIngestModal(); await tauriMessage('掃描錯誤：' + e.message); return; }

  if (scan.total === 0) { hideIngestModal(); await tauriMessage('找不到媒體檔案'); return; }

  // Show scan result, ask to proceed via in-app modal
  hideIngestModal();
  const limit = await showLimitModal(scan.total, scan.new);
  if (limit === null) return;

  // Step 2: Ingest with WebSocket real-time progress
  const targetCount = limit > 0 ? Math.min(limit, scan.new) : scan.new;
  showIngestModal(`處理中 0/${targetCount}`, '連接中...');

  // Connect WebSocket for real-time updates
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${wsProto}//${location.host}/ws/ingest`);

  ws.onmessage = async (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'file') {
      const statusMap = { scanning: '掃描中', transcribing: '轉錄中', analyzing: '分析中', done: '完成', skipped: '已跳過', error: '錯誤' };
      const statusText = statusMap[msg.status] || msg.status;
      updateIngestModal(`處理中 ${msg.index}/${msg.total}`, `${msg.filename} — ${statusText}`);
    } else if (msg.type === 'complete') {
      ws.close();
      hideIngestModal();
      await tauriMessage(`完成！新增 ${msg.ok} 個素材（跳過 ${msg.skipped}，失敗 ${msg.failed}）`);
      refresh(); renderAnalytics();
    }
  };
  ws.onerror = async () => { hideIngestModal(); await tauriMessage('WebSocket 連線錯誤'); };

  // Wait for WS to connect before triggering ingest (avoid race condition)
  ws.onopen = async () => {
    try {
      await fetch('/api/ingest/ws', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({path, limit})
      });
    } catch(e) { ws.close(); hideIngestModal(); await tauriMessage('錯誤：' + e.message); }
  };

  // Timeout fallback: if no WS message in 30s, close modal
  setTimeout(async () => {
    if (document.getElementById('ingestModal')) {
      ws.close(); hideIngestModal();
      await tauriMessage('Ingest 逾時，請重試或檢查 server logs');
    }
  }, 30000);
}

function showIngestModal(title, detail) {
  let m = document.getElementById('ingestModal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'ingestModal';
    m.style.cssText = 'position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6)';
    m.innerHTML = `<div class="modal-panel">
      <div id="ingestTitle" class="text-txt-primary" style="font-size:16px;font-weight:600;margin-bottom:8px"></div>
      <div id="ingestDetail" class="text-txt-secondary" style="font-size:12px;margin-bottom:16px"></div>
      <div class="bg-surface-200" style="width:100%;height:4px;border-radius:2px;overflow:hidden"><div id="ingestBar" style="height:100%;background:#3b82f6;border-radius:2px;transition:width 0.3s;width:0%"></div></div>
      <button onclick="hideIngestModal()" style="margin-top:12px;padding:4px 12px;font-size:12px;border:1px solid #555;border-radius:4px;cursor:pointer" class="text-txt-secondary">取消</button>
    </div>`;
    document.body.appendChild(m);
  }
  m.style.display = 'flex';
  document.getElementById('ingestTitle').textContent = title;
  document.getElementById('ingestDetail').textContent = detail;
}

function updateIngestModal(title, detail) {
  const t = document.getElementById('ingestTitle');
  const d = document.getElementById('ingestDetail');
  if (t) t.textContent = title;
  if (d) d.textContent = detail;
  // Parse progress from title like "處理中 2/5"
  const match = title.match(/(\d+)\/(\d+)/);
  if (match) {
    const pct = Math.round(parseInt(match[1]) / parseInt(match[2]) * 100);
    const bar = document.getElementById('ingestBar');
    if (bar) bar.style.width = pct + '%';
  }
}

function hideIngestModal() {
  const m = document.getElementById('ingestModal');
  if (m) m.style.display = 'none';
}

async function doChangeLang(id, lang) {
  if (!(await tauriAsk(`切換語言為 ${lang} 並重新轉錄？`))) { await fetchDetail(id); renderInspector(); return; }
  showIngestModal('重新轉錄中...', `語言: ${lang}`);
  try {
    const r = await fetch(`/api/media/${id}/retranscribe`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({language: lang})
    });
    hideIngestModal();
    if (r.ok) { await tauriMessage('轉錄完成'); await fetchDetail(id); renderInspector(); }
    else { const d = await r.json().catch(()=>({})); await tauriMessage('轉錄失敗: ' + (d.error || r.status)); }
  } catch(e) { hideIngestModal(); await tauriMessage('錯誤: ' + e.message); }
}

async function doReIngest(id) {
  if (!(await tauriAsk('重新處理此檔案？（probe + 轉錄 + 縮圖 + 視覺分析，需要幾分鐘）'))) return;
  showIngestModal('Re-ingest 處理中...', '正在重新分析影片');
  try {
    const r = await fetch(`/api/media/${id}/reingest`, { method: 'POST' });
    hideIngestModal();
    if (r.ok) {
      const data = await r.json();
      if (data.ok) {
        await tauriMessage('Re-ingest 完成！');
        await fetchDetail(id);
        renderInspector();
        await refresh();
      } else {
        await tauriMessage('Re-ingest 失敗：\n' + (data.stderr || data.error || ''));
      }
    } else {
      await tauriMessage('Re-ingest 失敗: HTTP ' + r.status);
    }
  } catch(e) { hideIngestModal(); await tauriMessage('Re-ingest 錯誤：' + e.message); }
}

    const grid = document.getElementById('mediaGrid');
    if (grid) grid.innerHTML = `<div class="col-span-4 text-center text-danger py-8">
      <div class="text-sm font-semibold mb-2">載入失敗</div>
      <div class="text-xs text-txt-secondary">${e.message}</div>
      <button class="mt-3 px-4 py-1.5 bg-accent text-white text-xs rounded-md" onclick="refresh()">重試</button>
    </div>`;
  }
}

// ── Filter Chips + Init ──────────────────────────────────────────────────────
// Note: <script> is at end of body, so DOM is already ready — no DOMContentLoaded needed.
// Tauri WKWebView has timing issues with DOMContentLoaded; direct init is more reliable.

document.getElementById('filterChips').addEventListener('click', async e => {
  const btn = e.target.closest('.filter-chip'); if(!btn) return;
  const ft = btn.dataset.filter, val = btn.dataset.value;
  if(ft==='type') {
    document.querySelectorAll('.filter-chip[data-filter="type"]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); state.filters.type = val;
  } else {
    const isActive = btn.classList.contains('active');
    document.querySelectorAll(`.filter-chip[data-filter="${ft}"]`).forEach(b=>b.classList.remove('active'));
    if(!isActive) { btn.classList.add('active'); state.filters[ft]=val; } else { state.filters[ft]=null; }
  }
  state.page=0; await refresh();
});

document.getElementById('sortSelect').addEventListener('change', async e => { state.sort=e.target.value; state.page=0; await refresh(); });

var searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async()=>{ state.query=e.target.value.trim(); state.page=0; await refresh(); }, 300);
});

// ── UI Scale ─────────────────────────────────────────────────────────────────
function setUiScale(val) {
  document.documentElement.style.fontSize = val + '%';
}

// ── Panel Resize ─────────────────────────────────────────────────────────────
(function() {
  function initResize(handleId, panelId, side) {
    var handle = document.getElementById(handleId);
    var panel = document.getElementById(panelId);
    if (!handle || !panel) return;
    var startX, startW;
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startX = e.clientX;
      startW = panel.offsetWidth;
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      function onMove(e) {
        var dx = e.clientX - startX;
        var newW = side === 'left' ? startW + dx : startW - dx;
        var min = parseInt(panel.style.minWidth) || 140;
        var max = parseInt(panel.style.maxWidth) || 500;
        panel.style.width = Math.max(min, Math.min(max, newW)) + 'px';
      }
      function onUp() {
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
  initResize('resizeLeft', 'poolPanel', 'left');
  initResize('resizeRight', 'inspectorPanel', 'right');
})();

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    fetch('/api/client-log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({level:'info', msg:'init start — isTauri=' + isTauri + ' UA=' + navigator.userAgent.slice(0,80)}) });
    await fetchMedia();
    await fetchAllTags();
    renderGrid();
    renderPool(state.items);
    renderPagination();
    renderContentTitle();
    renderAnalytics();
    fetch('/api/client-log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({level:'info', msg:'init OK — items=' + state.items.length + ' tags=' + state.allTags.length}) });
  } catch(e) {
    fetch('/api/client-log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({level:'error', msg:'init failed: ' + e.message + ' stack=' + (e.stack||'').slice(0,300)}) });
    var grid = document.getElementById('mediaGrid');
    if (grid) grid.innerHTML = '<div class="col-span-4 text-center py-8" style="color:#ef4444"><div style="font-size:14px;font-weight:600;margin-bottom:8px">載入失敗</div><div style="font-size:12px">' + e.message + '</div><button style="margin-top:12px;padding:4px 16px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer" onclick="location.reload()">重新載入</button></div>';
  }
})();
</script>
